<style>
  :root {
    --bg: #F0F0F0;
    --surface: #FFFFFF;
    --surface-alt: #F7F7F7;
    --text: #2C2C2C;
    --text-muted: #666666;
    --text-hint: #999999;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --accent: #6B4CA8;
    --accent-bg: #F0EBFA;
    --accent-text: #6B4CA8;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
  h1 { font-size: 22px; font-weight: 500; margin: 0; }
  p { margin: 0; }

  button {
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-strong);
    background: #FFFFFF;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    -webkit-appearance: none;
  }
  button:hover { background: var(--surface-alt); }
  button:active { transform: scale(0.98); }

  input[type="text"] {
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    -webkit-appearance: none;
    width: 100%;
  }
  input[type="text"]:focus {
    outline: none;
    box-shadow: 0 0 0 2px var(--accent);
  }

  input[type="range"] {
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
  }

  /* ----- Splash screen ----- */
  #splash {
    position: fixed;
    inset: 0;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.6s ease;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #splash.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #splash img {
    max-width: 70%;
    max-height: 65vh;
    object-fit: contain;
    opacity: 0;
    transform: scale(0.95);
    animation: splash-in 0.8s ease forwards;
  }
  #splash .splash-title {
    color: #2C2C2C;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-top: 24px;
    opacity: 0;
    animation: splash-in 0.8s ease 0.3s forwards;
  }
  @keyframes splash-in {
    to { opacity: 1; transform: scale(1); }
  }

  #app-shell {
    max-width: 640px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px);
  }

  /* ----- Belt frame borders ----- */
  .kr-frame {
    padding: 18px;
    border-radius: var(--radius-lg);
    background: var(--surface);
    transition: background 0.2s, padding 0.2s;
    position: relative;
    border: 1px solid var(--border);
  }
  .kr-frame-solid {
    border: 5mm solid var(--kr-belt, var(--border));
  }
  .kr-frame-split {
    border: 2mm solid var(--kr-belt, var(--border));
    box-shadow:
      inset 0 0 0 2mm #FFFFFF,
      inset 0 0 0 4mm var(--kr-belt, var(--border));
    padding: 22px;
  }

  /* 30 Throws black frame styling */
  .kr-frame-30throws {
    border: 5mm solid #000000;
    border-radius: 40px; /* Highly rounded as requested */
  }

  button.kr-belt-chip {
    text-align: left;
    position: relative;
    padding-left: 34px;
  }
  button.kr-belt-chip::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border-radius: 3px;
    background: var(--kr-chip, #888);
    border: 0.5px solid var(--border-strong);
  }
  button.kr-belt-chip.kr-split::before {
    background:
      linear-gradient(
        to bottom,
        var(--kr-chip, #888) 0 33%,
        #FFFFFF 33% 66%,
        var(--kr-chip, #888) 66% 100%
      );
  }

  .card-link {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .card-link:hover { background: var(--surface-alt); }

  .move-card {
    background: var(--surface-alt);
    border-radius: var(--radius-lg);
    padding: 32px 20px 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    border: 1px solid var(--border);
  }

  .move-number-top-left {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }

  .move-pill {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 12px;
    border: 0.5px solid var(--border);
  }
  .move-name {
    font-size: 26px;
    font-weight: 500;
    margin: 0;
    word-wrap: break-word;
  }
  .move-number-badge {
    font-size: 12px;
    color: var(--text-hint);
    margin-bottom: 6px;
  }

  /* Info icon button */
  .info-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    transition: background 0.15s, color 0.15s;
  }
  .info-btn:hover { background: var(--accent-bg); color: var(--accent-text); }
  .info-btn.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

  .info-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
    margin-top: 10px;
    text-align: left;
  }

  /* Menu logo (small version shown on home) */
  .menu-logo {
    display: block;
    margin: 0 auto 20px;
    max-width: 120px;
    max-height: 120px;
    object-fit: contain;
  }
</style>
</head>

      const t=el("input",{type:"text",value:m,"on":function on(e){state.moves[b][i]=e.target.value,persist()},"style":"flex: 1;"});
      const d=el("button",{"on":function on(){state.moves[b].splice(i,1),persist(),render()},"style":"padding: 10px 14px;"},"×");
      r.appendChild(t);
      r.appendChild(d);
      l.appendChild(r);
    }));
    const a=el("button",{"on":function on(){state.moves[b]||(state.moves[b]=[]),state.moves[b].push("Move "+(state.moves[b].length+1)),persist(),render()},"style":"width: 100%;"},"+ Add move");
    const d=frame(b,[c,h,l,a]);
    root.appendChild(d)}

  // ----- Shared header -----
  function renderHeader(t){
    const h=el("div",{"style":"display: flex; justify-content: space-between; align-items: center; margin: 0 0 16px; gap: 12px;"});
    const c=el("h1",{"style":"font-size: 20px; font-weight: 500; margin: 0; flex: 1;"},[t]);
    const b=el("button",{"on":function on(){state.screen="menu",state.sequence=[],state.current=0,state.infoOpen=null,render()}},"Menu");
    h.appendChild(c);
    h.appendChild(b);
    return h;
  }

  render();
})();
</script>
